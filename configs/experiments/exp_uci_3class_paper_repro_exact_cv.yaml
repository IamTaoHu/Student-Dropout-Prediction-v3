experiment:
  id: exp_uci_3class_paper_repro_exact_cv
  seed: 42
  dataset_config: configs/datasets/uci_student_presplit_parquet.yaml
  target_formulation: three_class

target:
  class_order: [Dropout, Enrolled, Graduate]

target_mapping_override:
  three_class:
    Dropout: 0
    Enrolled: 1
    Graduate: 2

training:
  mode: paper_reproduction_cv

splits:
  test_size: 0.20
  validation_size: 0.20
  stratify_column: target

preprocessing:
  drop_missing_rows: true
  missing_values:
    drop_rows: true
  imputation: median_mode
  encoding: onehot
  scaling: standard
  require_onehot_encoding: true
  outlier:
    enabled: true
    method: isolation_forest
    apply_before_preprocessing: true
    contamination: 0.10
    n_estimators: 200
    random_state: 42
    removal_warning_fraction: 0.25
    revert_if_removed_fraction_above: 0.25
  balancing:
    enabled: true
    method: smote
    k_neighbors: 5
    random_state: 42
    allow_skip_on_failure: true

feature_engineering:
  dataset_features:
    builder: uci_student_paper_style_features
    derive_safe_features: false
    derive_enrolled_focus_features: false
    enrolled_feature_groups:
      enabled: false

models:
  candidates:
    - decision_tree
    - random_forest
    - svm
    - gradient_boosting
    - xgboost
    - lightgbm
    - catboost
    - mlp
  tuning:
    backend: optuna
    n_trials: 10
    cv_folds: 5
    scoring: macro_f1
    objective_source: paper_cv
    objective_metric: macro_f1
  retrain_on_full_train_split: true

evaluation:
  primary_selection_metric: cv_macro_f1
  metrics:
    - accuracy
    - macro_f1
    - weighted_f1
    - balanced_accuracy
    - macro_precision
    - macro_recall
  compare_default_argmax: false
  decision_rule: argmax
  save_confusion_matrix: true
  save_classification_report: true
  cross_validation:
    enabled: true
    n_splits: 5
    shuffle: true
    random_state: 42

inference:
  multiclass_decision:
    strategy: argmax

selection:
  primary: cv_macro_f1
  tie_breakers:
    - cv_macro_precision
    - cv_macro_recall
    - cv_balanced_accuracy_mean

metrics:
  primary: cv_macro_f1
  secondary:
    - cv_macro_precision
    - cv_macro_recall
    - test_macro_f1
    - test_macro_precision
    - test_macro_recall

outputs:
  results_dir: results/exp_uci_3class_paper_repro_exact_cv
  runtime_artifact_format: csv
  mirror_benchmark_outputs_to_runtime: true
  save_artifact_manifest: true
