# UCI / UCI Student dataset configuration.
# Aligned to article_CSEDU_2026:
# - CI is treated as a 3-class problem: Dropout / Enrolled / Graduate
# - raw UCI file uses semicolon-separated columns and target column name "Target"
# - this dataset has no natural student_id column, so entity_id is generated in adapter

dataset:
  name: uci_student
  source_format: csv

paths:
  # UCI workflow should rebuild from raw CSV through loader -> adapter -> feature_builder.
  raw_root: data/raw/uci_student
  raw_file: data/raw/uci_student/uci_student.csv
  interim_root: data/interim/uci_student
  processed_root: data/processed/uci_student_features.csv

source:
  filename: uci_student.csv
  delimiter: ";"
  encoding: utf-8

schema:
  entity_id: null
  term_column: null
  outcome_column: Target

features:
  builder: uci_student_features
  derive_safe_features: true
  include_groups:
    - demographics
    - enrollment
    - academic_performance
    - engagement

outputs:
  # Export helper artifact only; experiments continue to read raw CSV via dataset config.
  features_filename: uci_student_features.parquet

preprocessing:
  # Optional dataset-specific leakage guards; merged with experiment-level forbidden columns.
  forbidden_feature_columns: []

target_mappings:
  binary:
    Dropout: 1
    Enrolled: 0
    Graduate: 0

  three_class:
    Dropout: 2
    Enrolled: 1
    Graduate: 0

  four_class:
    Dropout: 2
    Enrolled: 1
    Graduate: 0
